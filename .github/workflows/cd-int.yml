name: Deploy to Integration
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Docker image tag to deploy (default: int-{sha})"
        required: false
        type: string
        default: ""
      run-tests:
        description: "Run integration tests after deployment"
        required: false
        type: boolean
        default: true

jobs:
  deploy-int:
    name: Deploy to Integration
    uses: projet-ccm2/shared-workflows/.github/workflows/nodejs-cd.yml@main
    if: github.event_name != 'pull_request'
    with:
      docker-image-name: db-gateway-api-int
      docker-tag: ${{ github.event.inputs.image-tag || format('int-{0}', github.sha) }}
      artifact-registry-repository: "db-gateway-docker-int"
      environment: integration
      cloud-run-service-name: db-gateway-int
      service_type: back_prive
      required_env_vars: DATABASE_URL,MYSQL_DATABASE,MYSQL_USER,MYSQL_PASSWORD,JWT_SECRET
    secrets:
      GCP_SA_KEY: ${{ secrets.INT_GCP_SA_KEY }}
      GCP_PROJECT_ID: ${{ secrets.INT_GCP_PROJECT_ID }}
      TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
      JWT_SECRET: ${{ secrets.JWT_SECRET_INT }}
      DATABASE_URL: ${{ secrets.DATABASE_URL_INT }}
      MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE_INT }}
      MYSQL_USER: ${{ secrets.MYSQL_USER_INT }}
      MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD_INT }}