name: Deploy to Production
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy (e.g., v1.2.3)"
        required: true
        type: string

jobs:
  deploy-prod:
    name: Deploy to Production
    uses: projet-ccm2/shared-workflows/.github/workflows/nodejs-cd.yml@main
    if: github.event_name != 'pull_request'
    with:
      docker-image-name: db-gateway-api-prod
      docker-tag: ${{ github.event.inputs.version || github.ref_name }}
      artifact-registry-repository: "db-gateway-docker-prod"
      environment: production
      cloud-run-service-name: db-gateway-prod
      service_type: back_prive
      required_env_vars: DATABASE_URL,MYSQL_DATABASE,MYSQL_USER,MYSQL_PASSWORD,JWT_SECRET

    secrets:
      GCP_SA_KEY: ${{ secrets.PROD_GCP_SA_KEY }}
      GCP_PROJECT_ID: ${{ secrets.PROD_GCP_PROJECT_ID }}
      TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
      JWT_SECRET: ${{ secrets.PROD_JWT_SECRET }}
      DATABASE_URL: ${{ secrets.DATABASE_URL_PROD }}
      MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE_PROD }}
      MYSQL_USER: ${{ secrets.MYSQL_USER_PROD }}
      MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD_PROD }}
