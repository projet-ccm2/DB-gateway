services:
  mysql:
    image: mysql:8.0
    container_name: mysql_${NODE_ENV}
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_${NODE_ENV}_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app_${NODE_ENV}
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      NODE_ENV: ${NODE_ENV}
    volumes:
      - ./:/usr/src/app
    command: ["npm", "run", "dev"]
    ports:
      - "3000:3000"

volumes:
  mysql_development_data:
  mysql_test_data:
