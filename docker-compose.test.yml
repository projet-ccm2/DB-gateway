version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_db_gateway_test
    environment:
      MYSQL_ROOT_PASSWORD: testroot
      MYSQL_DATABASE: test_db
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
    ports:
      - "3307:3306"
    volumes:
      - mysql_test_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 10

volumes:
  mysql_test_data:
